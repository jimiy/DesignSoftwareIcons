name: 功能建议
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出想法！请说明使用场景，我们会评估是否纳入路线图。

  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题？
      description: 当前缺少什么能力，或哪里体验不够好
      placeholder: 例如：希望批量导出当前分类下所有图标...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你理想中的功能或交互是怎样的
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案（可选）
      description: 是否考虑过其他实现方式

  - type: dropdown
    id: area
    attributes:
      label: 相关模块
      options:
        - 主题分类 / 图标库
        - 图标库搜索
        - AI 生成
        - 外观配置 / 导出
        - 草图绘制
        - 文档 / 其他
    validations:
      required: true
