name: Bug 报告
description: 报告错误或异常行为
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈！请尽量提供可复现步骤，便于我们快速定位问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰描述发生了什么，以及你期望的行为
      placeholder: 例如：点击 AI 生成后页面无响应...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何触发该问题
      placeholder: |
        1. 打开右侧 AI 配置并启用
        2. 输入提示词「火箭图标」
        3. 点击 AI 生成
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 浏览器与版本
      placeholder: Chrome 131 / Edge 130 / Firefox 133
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: Windows 11 / macOS 15 / Ubuntu 24.04

  - type: textarea
    id: logs
    attributes:
      label: 控制台错误或截图
      description: 如有浏览器控制台报错或截图，请粘贴或说明
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，确认没有重复
          required: true
        - label: 我使用的是最新 main 分支代码
          required: false
